  <!-- tags row -->
  <!-- tag: WordPress -->
  <rect x="470" y="252" width="86" height="22" rx="5" fill="#21262d" stroke="#30363d" stroke-width="1"/>
  <text x="513" y="267" text-anchor="middle" font-family="'Courier New',monospace" font-size="10" fill="#00f5ff">WordPress</text>

  <!-- tag: Shopify -->
  <rect x="562" y="252" width="66" height="22" rx="5" fill="#21262d" stroke="#30363d" stroke-width="1"/>
  <text x="595" y="267" text-anchor="middle" font-family="'Courier New',monospace" font-size="10" fill="#3fb950">Shopify</text>

  <!-- tag: Joomla -->
  <rect x="634" y="252" width="60" height="22" rx="5" fill="#21262d" stroke="#30363d" stroke-width="1"/>
  <text x="664" y="267" text-anchor="middle" font-family="'Courier New',monospace" font-size="10" fill="#f0b429">Joomla</text>

  <!-- tag: Moodle -->
  <rect x="700" y="252" width="62" height="22" rx="5" fill="#21262d" stroke="#30363d" stroke-width="1"/>
  <text x="731" y="267" text-anchor="middle" font-family="'Courier New',monospace" font-size="10" fill="#ff7b72">Moodle</text>

  <!-- tag: React -->
  <rect x="470" y="280" width="55" height="22" rx="5" fill="#21262d" stroke="#30363d" stroke-width="1"/>
  <text x="497" y="295" text-anchor="middle" font-family="'Courier New',monospace" font-size="10" fill="#61dafb">React</text>

  <!-- tag: Node.js -->
  <rect x="531" y="280" width="64" height="22" rx="5" fill="#21262d" stroke="#30363d" stroke-width="1"/>
  <text x="563" y="295" text-anchor="middle" font-family="'Courier New',monospace" font-size="10" fill="#3fb950">Node.js</text>

  <!-- tag: MongoDB -->
  <rect x="601" y="280" width="72" height="22" rx="5" fill="#21262d" stroke="#30363d" stroke-width="1"/>
  <text x="637" y="295" text-anchor="middle" font-family="'Courier New',monospace" font-size="10" fill="#47a248">MongoDB</text>

  <!-- tag: PHP -->
  <rect x="679" y="280" width="44" height="22" rx="5" fill="#21262d" stroke="#30363d" stroke-width="1"/>
  <text x="701" y="295" text-anchor="middle" font-family="'Courier New',monospace" font-size="10" fill="#a78bfa">PHP</text>

  <!-- stats row -->
  <g font-family="'Courier New',monospace">
    <!-- stat 1 -->
    <text x="470" y="340" font-size="26" font-weight="700" fill="#00f5ff">3+</text>
    <text x="470" y="356" font-size="9" fill="#8b949e" letter-spacing="1">YRS EXP</text>
    <!-- divider -->
    <line x1="532" y1="322" x2="532" y2="362" stroke="#21262d" stroke-width="1"/>
    <!-- stat 2 -->
    <text x="548" y="340" font-size="26" font-weight="700" fill="#3fb950">50+</text>
    <text x="548" y="356" font-size="9" fill="#8b949e" letter-spacing="1">PROJECTS</text>
    <!-- divider -->
    <line x1="618" y1="322" x2="618" y2="362" stroke="#21262d" stroke-width="1"/>
    <!-- stat 3 -->
    <text x="634" y="340" font-size="26" font-weight="700" fill="#f0b429">10+</text>
    <text x="634" y="356" font-size="9" fill="#8b949e" letter-spacing="1">CMS BUILDS</text>
    <!-- divider -->
    <line x1="712" y1="322" x2="712" y2="362" stroke="#21262d" stroke-width="1"/>
    <!-- stat 4 -->
    <text x="728" y="340" font-size="26" font-weight="700" fill="#ff7b72">∞</text>
    <text x="728" y="356" font-size="9" fill="#8b949e" letter-spacing="1">COFFEES</text>
  </g>

  <!-- bottom bar -->
  <rect x="0" y="388" width="860" height="12" rx="0" fill="#0d1117"/>
  <rect x="0" y="388" width="860" height="1" fill="#21262d"/>
  <text x="430" y="397" text-anchor="middle" font-family="'Courier New',monospace" font-size="8" fill="#484f58">github.com/Kuldip1211  ·  kuldeepchudasama6999@gmail.com  ·  India 🇮🇳</text>
</svg>
